# clawdparty dev stack — one container per process.
#
# Five services, one process each: rails (Puma), jobs (Solid Queue), postgres,
# sidecar (Fastify + Agent SDK), vite (dev SPA server). Only `rails` publishes a
# port (3000 -> LAN); sidecar/vite are compose-network only. Run with `bin/start`
# (after `bin/setup`). See docs/PLAN.md §2/§3 + CLAUDE.md for the invariants.

# Pin the project name so the whole stack always comes up under `clawdparty`
# (containers `clawdparty-<service>-1`), independent of the host directory name.
name: clawdparty

services:
  # --- PostgreSQL 18 -------------------------------------------------------
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      # postgres:18+ stores data in a version subdir and expects the volume at
      # /var/lib/postgresql (NOT /var/lib/postgresql/data — the 18 image rejects
      # the old path as an "unused mount/volume" and refuses to start).
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 20
    # No `ports:` — postgres is reachable only on the compose network.

  # --- Rails 8 API + ActionCable (Puma) — the ONLY published port ----------
  rails:
    build:
      context: .
      dockerfile: docker/rails.Dockerfile
    restart: unless-stopped
    command: ["bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      SIDECAR_URL: ${SIDECAR_URL:-http://sidecar:8787}
      # In-container repo root == the host path (identical-path mount below), so
      # git worktree metadata (absolute gitdir paths) is valid on BOTH host and
      # container — GitHub Desktop / host `git worktree` can open the worktrees.
      REPO_ROOT: ${TARGET_REPO_PATH:-/repo}
    volumes:
      - ./api:/app:delegated
      - bundle:/usr/local/bundle
      # The frozen contracts package, mounted at /packages so the app's
      # Rails.root.join("..","packages",...) resolves identically in-container
      # and on the host (fake-Claude replay reads the fixture + CONTRACT_VERSION).
      - ./packages:/packages:ro
      # Target repo mounted at the IDENTICAL host path (not /repo) so worktree
      # gitdir absolute paths resolve on the host too. TARGET_REPO_PATH must be
      # an ABSOLUTE host path (the parent of your repos).
      - ${TARGET_REPO_PATH:-/repo}:${TARGET_REPO_PATH:-/repo}
    depends_on:
      postgres:
        condition: service_healthy

  # --- Solid Queue supervisor — same image as rails, different command -----
  jobs:
    build:
      context: .
      dockerfile: docker/rails.Dockerfile
    restart: unless-stopped
    command: ["bin/jobs"]
    env_file:
      - path: .env.local
        required: false
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      REPO_ROOT: ${TARGET_REPO_PATH:-/repo}
    volumes:
      - ./api:/app:delegated
      - bundle:/usr/local/bundle
      - ./packages:/packages:ro
    depends_on:
      postgres:
        condition: service_healthy
      rails:
        condition: service_started
    # No `ports:` — jobs runs no server. restart: unless-stopped doubles as the
    # restart-until-ready posture if it boots before rails has prepared the queue DB.

  # --- Node sidecar (Fastify + Agent SDK) — UNPUBLISHED --------------------
  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile
    # Independent lifecycle: its OWN restart policy, NOT a depends_on child of
    # rails — a Rails restart must never kill a live Claude run.
    restart: unless-stopped
    env_file:
      - path: .env.local
        required: false
    # List form so bare keys pass through from the host ONLY WHEN SET (the SDK's
    # own auto-detection/precedence is preserved; nothing is forced to empty).
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - RAILS_INTERNAL_URL=${RAILS_INTERNAL_URL:-http://rails:3000}
      # Claude / AWS auth + config (ANTHROPIC_MODEL, CLAUDE_CODE_USE_BEDROCK/VERTEX,
      # AWS_PROFILE/AWS_REGION, or ANTHROPIC_API_KEY / ANTHROPIC_AUTH_TOKEN /
      # CLAUDE_CODE_OAUTH_TOKEN) live in .env.local (the env_file above) — NOT as bare
      # host-shell passthroughs. A bare `- VAR` here OVERRIDES env_file, and when the
      # host shell doesn't export VAR it injects an EMPTY value, which silently
      # unset CLAUDE_CODE_USE_BEDROCK (→ "Not logged in"). The actual secrets are
      # supplied by the read-only ~/.claude + ~/.aws mounts below; only the
      # selectors/config live in .env.local.
    expose:
      - "8787"
    volumes:
      - ./sidecar:/app:delegated
      - sidecar_node_modules:/app/node_modules
      # Target repo READ-WRITE, mounted at the IDENTICAL host path (Claude edits
      # the worktree; reject reverts it). Same absolute path as the host + rails
      # so worktree gitdir paths resolve everywhere and the run cwd (a host path
      # from the run-start payload) is valid in-container.
      - ${TARGET_REPO_PATH:-/repo}:${TARGET_REPO_PATH:-/repo}
      # Host login. Targets the `node` user's home so `~/.claude` / `~/.aws`
      # resolve to the mounts. `~/.claude` is READ-WRITE: the Agent SDK writes
      # runtime dirs there (session-env/<id> per run, and the resume JSONL under
      # projects/ — the resume design wants that persisted to the host). A
      # read-only mount fails the run with EROFS on session-env mkdir. `~/.aws`
      # stays READ-ONLY (the Bedrock/AWS credentials — tamper-safe; not in ~/.claude).
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.aws:/home/node/.aws:ro
    # No `ports:` key at all — reachable only on the compose network.

  # --- Vite dev server (dev only) — UNPUBLISHED ----------------------------
  vite:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Polling so HMR detects host edits over the macOS :delegated bind mount.
      VITE_USE_POLLING: ${VITE_USE_POLLING:-true}
    expose:
      - "5173"
    volumes:
      - ./web:/app:delegated
      - web_node_modules:/app/node_modules
      # The frozen contracts package, mounted at /packages so the
      # web/node_modules/@clawdparty/contracts symlink (../../../packages/contracts
      # → /packages/contracts) resolves in-container — needed once web imports a
      # runtime VALUE from it (type-only imports are erased and never resolved).
      - ./packages:/packages:ro
    # No `ports:` key — the browser reaches the SPA only via the rails reverse-proxy.

volumes:
  pg_data:
  bundle:
  sidecar_node_modules:
  web_node_modules:
